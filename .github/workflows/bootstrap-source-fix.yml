name: Bootstrap Source Fix

on:
  push:
    paths:
      - .github/workflows/bootstrap-source-fix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download source archive
        run: |
          curl -L "https://tmpfiles.org/dl/34704909/promptuno-source-fix.zip" -o /tmp/promptuno-source-fix.zip
      - name: Unpack source files
        run: |
          unzip -o /tmp/promptuno-source-fix.zip -d .
          rm -f /tmp/promptuno-source-fix.zip
      - name: Commit source files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- ':!.github/workflows/*.yml'
          git commit -m "Fix app for static hosting" || exit 0
          git push
