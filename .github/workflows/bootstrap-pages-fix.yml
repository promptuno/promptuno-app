name: Bootstrap Pages Fix

on:
  push:
    paths:
      - .github/workflows/bootstrap-pages-fix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download project archive
        run: |
          curl -L "https://tmpfiles.org/dl/34704448/promptuno-app-pages-fix.zip" -o /tmp/promptuno-app-pages-fix.zip
      - name: Unpack project files
        run: |
          unzip -o /tmp/promptuno-app-pages-fix.zip -d .
          rm -f /tmp/promptuno-app-pages-fix.zip
      - name: Commit project files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix static deployment setup" || exit 0
          git push
