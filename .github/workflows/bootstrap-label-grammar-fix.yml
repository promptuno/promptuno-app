name: Bootstrap Label Grammar Fix

on:
  push:
    paths:
      - .github/workflows/bootstrap-label-grammar-fix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch composer label grammar
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/Composer.tsx')
          text = path.read_text()
          old = '''  const currentPlatforms = mode === "Code" 
    ? CODE_PLATFORMS 
    : (mode === "Image" ? IMAGE_PLATFORMS : PLATFORMS);
'''
          new = '''  const currentPlatforms = mode === "Code" 
    ? CODE_PLATFORMS 
    : (mode === "Image" ? IMAGE_PLATFORMS : PLATFORMS);
  const createForLabel = lang === "en"
    ? mode === "Code"
      ? "Create an architecture for"
      : mode === "Image"
        ? "Create an image prompt for"
        : "Create a prompt for"
    : t.labels.CreateFor.replace('{type}', mode === "Code" ? t.labels.Architecture : (mode === "Image" ? t.labels.ArtVibe : t.labels.Prompt));
'''
          if old not in text:
              raise SystemExit('Could not find currentPlatforms block')
          text = text.replace(old, new, 1)
          old_expr = '''            {t.labels.CreateFor.replace('{type}', mode === "Code" ? t.labels.Architecture : (mode === "Image" ? t.labels.ArtVibe : t.labels.Prompt))}'''
          if old_expr not in text:
              raise SystemExit('Could not find label expression')
          text = text.replace(old_expr, '            {createForLabel}', 1)
          path.write_text(text)
          PY
      - name: Commit composer label fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/Composer.tsx
          git commit -m "Fix mobile create label grammar" || exit 0
          git push
