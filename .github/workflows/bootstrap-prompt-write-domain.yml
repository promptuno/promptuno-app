name: Bootstrap Prompt Write Domain

on:
  push:
    paths:
      - .github/workflows/bootstrap-prompt-write-domain.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download source archive
        run: |
          curl -L "https://tmpfiles.org/dl/34828966/promptuno-prompt-write-domain.zip" -o /tmp/promptuno-prompt-write-domain.zip
      - name: Unpack source files
        run: |
          unzip -o /tmp/promptuno-prompt-write-domain.zip -d .
          rm -f /tmp/promptuno-prompt-write-domain.zip
      - name: Commit source files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- ':!.github/workflows/*.yml'
          git commit -m "Unify Promptuno prompt and write modes" || exit 0
          git push
