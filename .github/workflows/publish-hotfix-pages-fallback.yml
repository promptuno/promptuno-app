name: Publish Promptuno Hotfix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-hotfix-pages-fallback.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-hotfix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download patch
        run: curl -L --fail --retry 3 https://tmpfiles.org/dl/35685204/promptuno-hotfix.patch -o /tmp/promptuno-hotfix.patch
      - name: Apply patch
        run: git apply /tmp/promptuno-hotfix.patch
      - name: Commit hotfix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx src/components/Composer.tsx src/components/PromptResponse.tsx src/components/Typewriter.tsx
          git commit -m "Fix prompt fallback and vibe UI"
          git push
