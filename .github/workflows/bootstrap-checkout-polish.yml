name: Bootstrap Checkout Polish

on:
  push:
    paths:
      - .github/workflows/bootstrap-checkout-polish.yml

permissions:
  contents: write

jobs:
  upload-project:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download source bundle
        run: |
          curl -L "https://tmpfiles.org/dl/34915438/promptuno-source.zip" -o /tmp/promptuno-source.zip

      - name: Unpack source
        run: |
          rm -rf /tmp/promptuno-source
          mkdir -p /tmp/promptuno-source
          unzip -oq /tmp/promptuno-source.zip -d /tmp/promptuno-source

      - name: Sync repository contents
        run: |
          rsync -a --delete --exclude '.git' --exclude '.github' /tmp/promptuno-source/ ./

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- ':!.github/workflows/*.yml'
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Polish checkout selection flow"
          git push origin HEAD:main
