name: Bootstrap Promptuno Upload

on:
  push:
    paths:
      - .github/workflows/bootstrap-upload.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download project archive
        run: |
          curl -L "https://tmpfiles.org/dl/34702849/promptuno-app-upload.zip" -o /tmp/promptuno-app-upload.zip
      - name: Unpack project files
        run: |
          unzip -o /tmp/promptuno-app-upload.zip -d .
          rm -f /tmp/promptuno-app-upload.zip
      - name: Commit project files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Upload Promptuno app" || exit 0
          git push
