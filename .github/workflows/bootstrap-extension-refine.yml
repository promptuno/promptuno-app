name: Bootstrap Extension Refine

on:
  push:
    paths:
      - .github/workflows/bootstrap-extension-refine.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download source archive
        run: |
          curl -L "https://tmpfiles.org/dl/34825117/promptuno-source-extension-refine.zip" -o /tmp/promptuno-source-extension-refine.zip
      - name: Unpack source files
        run: |
          unzip -o /tmp/promptuno-source-extension-refine.zip -d .
          rm -f /tmp/promptuno-source-extension-refine.zip
      - name: Commit source files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- ':!.github/workflows/*.yml'
          git commit -m "Add Chrome extension and refine layer" || exit 0
          git push
