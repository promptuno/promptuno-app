<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <meta name="theme-color" content="#A855F7" />
    <meta name="description" content="Promptuno helps you generate better AI prompts on the web and inside your browser." />
    <link rel="canonical" href="https://www.promptuno.chat/" />
    <meta property="og:title" content="Promptuno" />
    <meta property="og:description" content="Generate better prompts for ChatGPT, Claude, Gemini, and Copilot." />

    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/6124/6124995.png" />

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('%BASE_URL%sw.js').then(reg => {
            console.log('SW registered:', reg);
          }).catch(err => {
            console.log('SW reg error:', err);
          });
        });
      }
    </script>
  </body>
